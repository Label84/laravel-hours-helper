name: Run Pint

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
    pint:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Run Pint
                uses: aglipanci/laravel-pint-action@2.6.0

            -   name: Commit changes
                uses: stefanzweifel/git-auto-commit-action@v5
                with:
                    commit_message: Fix styling
